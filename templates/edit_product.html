{% extends 'base.html' %} {% block content %}

<h1>Edit Product</h1>
<form method="POST">
  <input name="name" value="{{ product.name }}" required />
  <input
    name="price"
    type="number"
    step="0.01"
    value="{{ product.price }}"
    required
  />
  <input name="units" value="{{ product.units }}" />
  <input name="stock" type="number" value="{{ product.stock }}" />

  <button type="submit">Update</button>
</form>

{% endblock %}
