{% extends 'base.html' %} {% block content %}
<div class="dash-head">
  <h1>Admin Dashboard</h1>
  <a class="btn" href="{{ url_for('add_section') }}">Add Section</a>
</div>

{% for section in sections %}
<div class="card">
  <h2>{{ section.name }}</h2>
  <p>{{ section.description }}</p>
  <a href="{{ url_for('edit_section', id=section.id) }}">Edit</a>
  <a href="{{ url_for('delete_section', id=section.id) }}">Delete</a>
</div>
{% else %}
<p>No Sections Yet!</p>
{% endfor %} {% endblock %}
